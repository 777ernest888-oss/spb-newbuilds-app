<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Новостройки СПб</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Welcome Screen -->
  <div id="welcomeScreen">
    <img id="welcomeImage" src="" alt="Welcome" class="welcome-image">
    <h1 id="welcomeTitle"></h1>
    <p id="welcomeSubtitle"></p>
    <button id="startBtn" class="tg-btn" onclick="startApp()">Начать подбор</button>
  </div>

  <!-- Main Content -->
  <div id="mainContent" class="hidden">
    <!-- Filters Toggle Button -->
    <button class="tg-btn filters-toggle-btn" onclick="toggleFilters()">
      🔽 Фильтры
    </button>

    <!-- Filters Block (collapsible) -->
    <div id="filtersBlock" class="hidden">
      <div class="filters" id="filtersContainer">
        <div class="filter-group">
          <label>Район:</label>
          <div id="districtCheckboxes" class="checkbox-group"></div>
        </div>
        <div class="filter-group">
          <label>Метро:</label>
          <div id="metroCheckboxes" class="checkbox-group"></div>
        </div>
        <div class="filter-group">
          <label>Цена до (млн ₽):</label>
          <input type="range" id="priceFilter" min="0" max="500" step="1" value="500">
          <div class="range-value"><span id="priceValue">500</span> млн ₽</div>
        </div>
      </div>
    </div>

    <!-- View Toggle -->
    <div class="view-toggle">
      <button id="listViewBtn" class="active" onclick="switchView('list')">📋 Список</button>
      <button id="mapViewBtn" onclick="switchView('map')">🗺 Карта</button>
    </div>
    <!-- Listings Container -->
    <div id="listingsContainer"></div>

    <!-- Map Container -->
    <div id="mapContainer" class="hidden"></div>
  </div>

  <!-- Modal for Details -->
  <div id="detailsModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Название ЖК</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div id="modalGallery" class="modal-gallery"></div>
      <div class="modal-body">
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-meta" id="modalMeta"></div>
       
        <div class="modal-section">
          <h3>Описание</h3>
          <p id="modalDescription"></p>
        </div>
       
        <div class="modal-section">
          <h3>Характеристики</h3>
          <div id="modalFeatures"></div>
        </div>
       
        <div class="modal-section">
          <h3>Планировки</h3>
          <div id="modalFloorPlans"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal for Consultation Form -->
  <div id="consultModal" class="modal hidden">
    <div class="modal-content" style="max-width: 400px; margin: 50px auto; padding: 30px;">
      <div class="modal-header">
        <h2>📞 Заказать консультацию</h2>
        <button class="close-btn" onclick="closeConsultModal()">✕</button>
      </div>
      <p style="margin-bottom: 20px; color: var(--text-secondary);">
        Оставьте контакты — мы перезвоним и ответим на все вопросы по объекту
      </p>
      <div id="consultObjectName" style="margin-bottom: 20px; padding: 12px; background: var(--bg); border-radius: 8px; font-weight: 600;"></div>
      <form id="consultForm" onsubmit="submitConsultForm(event)">
        <div style="margin-bottom: 16px;">          <label style="display: block; margin-bottom: 8px; font-weight: 600;">Ваше имя *</label>
          <input type="text" id="consultName" required style="width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px;">
        </div>
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600;">Телефон *</label>
          <input type="tel" id="consultPhone" required placeholder="+7 (___) ___-__-__" style="width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px;">
        </div>
        <button type="submit" class="tg-btn" style="width: 100%;">Отправить заявку</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
