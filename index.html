<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Каталог новостроек Санкт-Петербурга. Подбор квартир по бюджету, району и сроку сдачи.">
  <meta name="theme-color" content="#1a365d">
  <title>Новостройки СПб</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Leaflet CSS (Карта) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous"/>

  <!-- Наши стили -->
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>

  <!-- 🏠 ЭКРАН ПРИВЕТСТВИЯ -->
  <div id="welcomeScreen">
    <img id="welcomeImage" src="welcome.png" alt="Welcome" class="welcome-image" loading="lazy">
    <h1 id="welcomeTitle">Каталог новостроек</h1>
    <p id="welcomeSubtitle">Подберём квартиру под ваш бюджет</p>
    <button class="tg-btn" onclick="startApp()" type="button">Начать подбор</button>
  </div>

  <!--  ОСНОВНОЙ КОНТЕНТ -->
  <div id="mainContent" class="hidden">
  
    <!-- 🔍 ФИЛЬТРЫ -->
    <button class="tg-btn filters-toggle-btn" onclick="toggleFilters()" type="button">🔽 Фильтры</button>
  
    <div id="filtersBlock" class="filters hidden">
      <!-- Цена -->
      <div class="filter-group">
        <label>💰 Цена до (млн ₽)</label>
        <input type="range" id="priceFilter" min="5" max="50" value="50" step="1">
        <div class="range-value" id="priceValue">50 млн</div>
      </div>

      <!-- Районы -->
      <div class="filter-group">
        <label>📍 Районы</label>
        <div id="districtCheckboxes" class="checkbox-group"></div>
      </div>
      <!-- Метро -->      <div class="filter-group">
        <label>🚇 Метро</label>
        <div id="metroCheckboxes" class="checkbox-group"></div>
      </div>

      <!-- Комнаты -->
      <div class="filter-group">
        <label>🚪 Комнаты</label>
        <div id="roomsCheckboxes" class="checkbox-group"></div>
      </div>
    </div>

    <!-- 🔀 ПЕРЕКЛЮЧАТЕЛЬ ВИДА -->
    <div class="view-toggle">
      <button id="listViewBtn" class="active" onclick="switchView('list')" type="button">📋 Список</button>
      <button id="mapViewBtn" onclick="switchView('map')" type="button">🗺 Карта</button>
    </div>

    <!--  КОНТЕЙНЕРЫ -->
    <div id="listingsContainer"></div>
    <div id="mapContainer" class="hidden"></div>
  </div>

  <!-- 📋 МОДАЛЬНОЕ ОКНО ДЕТАЛЕЙ -->
  <div id="detailsModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="close-btn" onclick="closeModal()" type="button" aria-label="Закрыть">✕</button>
      </div>
    
      <div id="modalGallery" class="modal-gallery"></div>
      <div id="modalPrice" class="modal-price"></div>
      <div id="modalMeta" class="modal-meta"></div>
    
      <div class="modal-section">
        <h3>📖 Описание</h3>
        <div id="modalDescription"></div>
      </div>

      <div class="modal-section">
        <h3>✨ Преимущества</h3>
        <div id="modalFeatures"></div>
      </div>

      <div class="modal-section">
        <h3>📐 Планировки</h3>
        <div id="modalFloorPlans"></div>
      </div>
      <!-- 🔥 КНОПКА КОНСУЛЬТАЦИИ (ДОБАВЛЕНА) 🔥 -->
      <button id="modalConsultBtn" class="tg-btn modal-cta" type="button">📍 Получить консультацию</button>
      <!-- 🔥 КОНЕЦ ДОБАВЛЕНИЯ 🔥 -->

    </div>
  </div>

  <!-- 📞 МОДАЛЬНОЕ ОКНО ЗАЯВКИ -->
  <div id="consultModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Заказать консультацию</h2>
        <button class="close-btn" onclick="closeConsultModal()" type="button" aria-label="Закрыть">✕</button>
      </div>
    
      <p style="margin-bottom: 20px; color: var(--text-secondary)">Оставьте контакты — мы перезвоним и ответим на все вопросы по объекту</p>
    
      <div id="consultObjectName" class="consult-object-name">🏢 Объект</div>
    
      <form id="consultForm" onsubmit="submitConsultForm(event)">
        <div class="filter-group">
          <label>Ваше имя *</label>
          <input type="text" id="consultName" placeholder="Иван" required autocomplete="name">
        </div>
      
        <div class="filter-group">
          <label>Телефон *</label>
          <input type="tel" id="consultPhone" placeholder="+7 (___) ___-__-__" required autocomplete="tel">
        </div>
      
        <button type="submit" class="tg-btn" style="margin-top: 20px;">Отправить заявку</button>
      </form>
    </div>
  </div>

  <!-- Leaflet JS (Карта) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin="anonymous"></script>

  <!-- Наш скрипт -->
  <script src="app.js?v=5"></script>

</body>
</html>
